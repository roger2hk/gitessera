name: Add Entry

on:
  issues:
    types: [labeled]

concurrency:
  group: add-entry
  cancel-in-progress: false

jobs:
  add-entry:
    if: github.event.label.name == 'add-entry'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Build
        run: go build -o add_entry ./cmd/main.go
      - name: Run
        id: add_entry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOG_PRIVATE_KEY: ${{ secrets.LOG_PRIVATE_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: ./add_entry -owner ${{ github.repository_owner }} -repo ${{ github.event.repository.name }} -branch tlog -slog_level -4
      - name: Get Commit SHA
        id: get_sha
        run: |
          git fetch origin tlog --depth=1
          echo "commit_sha=$(git rev-parse origin/tlog)" >> $GITHUB_OUTPUT
      - name: Close Issue
        run: |
          gh issue close ${{ github.event.issue.number }} --comment "Auto-closed after adding to log.
          Index: ${{ steps.add_entry.outputs.seq_index }}
          Commit: ${{ steps.get_sha.outputs.commit_sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Comment on Failure
        if: failure()
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "Workflow failed to add entry. See logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
